<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Echo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#121212;
    --bg-elev:#181818;
    --card:#1F1F1F;
    --card-hover:#282828;
    --line: rgba(255,255,255,0.08);
    --text:#FFFFFF;
    --text-dim:#A7A7A7;
    --accent:#2ED9A0;
    --accent-press:#22B888;
    --accent-dim: rgba(30,215,96,0.16);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --ease: cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  button{transition: transform .12s cubic-bezier(.34,1.56,.64,1), background-color .15s ease, opacity .15s ease;}
  button:active{transform:scale(0.92);}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    overflow:hidden; overscroll-behavior:none;
  }
  button{font-family:inherit;}
  button, .tappable{transition: transform .12s var(--ease), background-color .15s ease, opacity .15s ease;}
  button:active, .tappable:active{transform:scale(0.93);}
  #app{display:flex; flex-direction:column; height:100vh; height:100dvh;}

  main{flex:1; overflow-y:auto; position:relative;}
  .view{
    display:none; padding: calc(18px + var(--safe-top)) 16px 110px;
    opacity:0; transform:translateY(10px);
  }
  .view.active{
    display:block; animation: viewIn .32s var(--ease) forwards;
  }
  @keyframes viewIn{ to{ opacity:1; transform:translateY(0); } }

  h1.greet{font-size:24px; font-weight:700; margin:0 0 18px;}
  .section-title{font-size:18px; font-weight:700; margin: 26px 0 12px; display:flex; align-items:center; justify-content:space-between;}
  .section-title .see-all{font-size:12px; color:var(--text-dim); font-weight:600;}

  /* Quick-pick row (home greeting cards) */
  .quickgrid{display:grid; grid-template-columns: 1fr 1fr; gap:10px;}
  .quick-card{
    background:var(--card); border-radius:6px; display:flex; align-items:center; gap:10px;
    overflow:hidden; cursor:pointer;
  }
  .quick-card:active{background:var(--card-hover);}
  .quick-card .thumb{
    width:54px; height:54px; flex-shrink:0; background:linear-gradient(135deg,#3a3a3a,#1a1a1a);
    display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:18px;
  }
  .quick-card .qname{font-size:13px; font-weight:700; padding-right:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Horizontal card scroller */
  .hscroll{display:flex; gap:14px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;}
  .hscroll::-webkit-scrollbar{display:none;}
  .tile{width:130px; flex-shrink:0; cursor:pointer;}
  .tile .art{
    width:130px; height:130px; border-radius:8px; background:linear-gradient(135deg,#2b2b2b,#161616);
    display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:30px;
    margin-bottom:8px; position:relative; overflow:hidden;
  }
  .tile .art.liked{background:linear-gradient(135deg,#3a1f5d,#2ED9A0);}
  .tile .name{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .tile .sub{font-size:11.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px;}
  .tile:active .art{transform:scale(0.96);}
  .tile .art{transition: transform .15s var(--ease);}

  .empty-state{text-align:center; padding:60px 20px; color:var(--text-dim);}
  .empty-state .glyph{font-size:36px; margin-bottom:12px; opacity:0.5;}
  .empty-state p{font-size:13px; line-height:1.6; margin:6px 0;}
  .empty-state .cta{
    margin-top:16px; background:var(--accent); color:#000; border:none; padding:11px 22px;
    border-radius:24px; font-weight:700; font-size:13px; cursor:pointer;
  }

  /* Search */
  #search-wrap{padding: calc(16px + var(--safe-top)) 16px 4px; flex-shrink:0; background:var(--bg);}
  #search{
    width:100%; padding:11px 14px; border-radius:8px; border:none;
    background:var(--bg-elev); color:var(--text); font-size:14px; outline:none;
  }
  #search::placeholder{color:var(--text-dim);}

  /* Song rows (shared: search results, all-songs, playlist detail) */
  .swipe-item{position:relative; overflow:hidden; border-radius:8px; margin-bottom:1px;}
  .swipe-action{
    position:absolute; inset:0; background:var(--accent-dim); color:var(--accent);
    display:flex; align-items:center; gap:8px; padding-left:18px; font-size:12.5px; font-weight:700;
  }
  .song-row{
    display:flex; align-items:center; gap:12px; padding:9px 6px;
    border-radius:8px; cursor:pointer; position:relative; background:var(--bg);
    touch-action: pan-y; transition: background-color .15s ease;
  }
  .song-row:active{background:var(--card);}
  .song-row .art{
    width:44px;height:44px;border-radius:4px;background:var(--card);
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
    font-size:16px; color:var(--text-dim);
  }
  .song-row.playing .art{background:var(--accent-dim); color:var(--accent);}
  .song-row .meta{flex:1; min-width:0;}
  .song-row .title{font-size:14.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .song-row.playing .title{color:var(--accent);}
  .song-row .artist{font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .song-row .heart-btn{
    width:30px;height:30px; flex-shrink:0; border:none; background:transparent; color:var(--text-dim);
    font-size:15px; border-radius:50%; cursor:pointer;
  }
  .song-row .heart-btn.liked{color:var(--accent);}
  .song-row .menu-btn{
    width:30px;height:30px; flex-shrink:0; border:none; background:transparent; color:var(--text-dim);
    font-size:18px; border-radius:50%; cursor:pointer;
  }

  /* Library rows (playlists) */
  .pl-row{
    display:flex; align-items:center; gap:12px; padding:8px 4px; cursor:pointer; border-radius:8px;
  }
  .pl-row:active{background:var(--card);}
  .pl-row .thumb{
    width:54px;height:54px;border-radius:6px; background:linear-gradient(135deg,#3a3a3a,#1a1a1a);
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; color:var(--text-dim);
  }
  .pl-row .thumb.liked{background:linear-gradient(135deg,#3a1f5d,#2ED9A0); color:#fff;}
  .pl-row .info{flex:1; min-width:0;}
  .pl-row .name{font-weight:700; font-size:14.5px;}
  .pl-row .count{font-size:12px; color:var(--text-dim); margin-top:2px;}

  .lib-pinned{
    display:flex; align-items:center; gap:12px; padding:10px 4px; margin-bottom:6px; cursor:pointer; border-radius:8px;
  }
  .lib-pinned:active{background:var(--card);}
  .lib-pinned .thumb{
    width:54px;height:54px;border-radius:6px; background:var(--card); display:flex; align-items:center;
    justify-content:center; font-size:20px; color:var(--text-dim); flex-shrink:0;
  }
  .lib-pinned .name{font-weight:700; font-size:14.5px;}
  .lib-pinned .sub{font-size:12px; color:var(--text-dim); margin-top:2px;}

  .lib-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .lib-header h1{font-size:24px; font-weight:700; margin:0;}

  /* Mini player bar */
  #mini-bar{
    position:fixed; left:0; right:0; bottom: calc(58px + var(--safe-bottom));
    background:#2a2a2a; padding:8px 10px; display:flex; align-items:center; gap:10px; z-index:50;
    transform: translateY(120%); transition: transform .32s var(--ease);
  }
  #mini-bar.show{transform:translateY(0);}
  #mini-progress{position:absolute; top:0; left:0; height:2px; background:var(--accent); width:0%;}
  #mini-art{
    width:38px;height:38px;border-radius:4px; background:var(--accent-dim);
    display:flex;align-items:center;justify-content:center; color:var(--accent); flex-shrink:0;
  }
  #mini-meta{flex:1; min-width:0;}
  #mini-title{font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #mini-artist{font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #mini-bar button{background:none;border:none;color:var(--text); font-size:19px; padding:6px; cursor:pointer;}

  /* Bottom nav */
  nav#bottom-nav{
    position:fixed; left:0; right:0; bottom:0; height: calc(58px + var(--safe-bottom));
    background:var(--bg-elev); border-top:1px solid var(--line);
    display:flex; padding-bottom: var(--safe-bottom); z-index:40;
  }
  nav#bottom-nav button{
    flex:1; background:none; border:none; color:var(--text-dim); font-size:10.5px;
    display:flex; flex-direction:column; align-items:center; gap:4px; padding-top:9px; cursor:pointer;
    font-weight:600;
  }
  nav#bottom-nav button.active{color:var(--text);}
  nav#bottom-nav .gi{font-size:20px;}

  #fab{
    position:fixed; right:18px; bottom: calc(76px + var(--safe-bottom)); z-index:45;
    width:50px;height:50px;border-radius:50%; background:var(--accent); border:none;
    color:#000; font-size:22px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.45); cursor:pointer;
  }

  /* Full player overlay */
  #player-overlay{
    position:fixed; inset:0; background:linear-gradient(180deg,#2a2a2a,#0d0d0d 55%); z-index:100;
    display:flex; flex-direction:column; padding: calc(16px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
    transform:translateY(100%); transition: transform .36s var(--ease);
    visibility:hidden;
  }
  #player-overlay.show{transform:translateY(0); visibility:visible;}
  .po-top{display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
  .po-top .lbl{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); font-weight:700;}
  .po-stage{flex:1; display:flex; align-items:center; justify-content:center;}
  .album-art{
    width:280px; height:280px; max-width:78vw; max-height:78vw; border-radius:10px;
    background:linear-gradient(135deg,#3a3a3a,#121212); display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:60px; box-shadow:0 20px 50px rgba(0,0,0,0.5);
    transition: transform .25s var(--ease);
  }
  .album-art.liked{background:linear-gradient(135deg,#3a1f5d,#2ED9A0);}
  .po-meta{display:flex; align-items:center; justify-content:space-between; margin-top:26px; flex-shrink:0;}
  .po-title{font-size:19px; font-weight:700; max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .po-artist{font-size:13px; color:var(--text-dim); margin-top:4px;}
  .heart-big{background:none;border:none; color:var(--text-dim); font-size:22px; cursor:pointer;}
  .heart-big.liked{color:var(--accent);}
  .po-progress{flex-shrink:0; margin-top:14px;}
  #seek{width:100%; accent-color: var(--text); height:4px;}
  .po-times{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-top:2px;}
  .po-controls{display:flex; align-items:center; justify-content:center; gap:28px; margin-top:14px; flex-shrink:0;}
  .po-controls button{background:none;border:none;color:var(--text); cursor:pointer;}
  .po-controls .play-btn{
    width:64px;height:64px;border-radius:50%; background:var(--text); color:#000;
    display:flex;align-items:center;justify-content:center; font-size:24px;
  }
  .po-controls .play-btn:active{background:#ddd;}
  .po-controls .side-btn{font-size:26px;}
  .po-controls .toggle-btn{font-size:18px; opacity:0.5;}
  .po-controls .toggle-btn.on{opacity:1; color:var(--accent);}

  /* Modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0); z-index:200; display:flex;
    align-items:flex-end; justify-content:center; pointer-events:none; transition: background-color .25s ease;
  }
  .modal-backdrop.show{background:rgba(0,0,0,0.6); pointer-events:auto;}
  .modal-sheet{
    width:100%; max-width:480px; background:var(--bg-elev); border-radius:14px 14px 0 0;
    padding: 18px 20px calc(24px + var(--safe-bottom)); max-height:70vh; overflow-y:auto;
    transform: translateY(100%); transition: transform .3s var(--ease);
  }
  .modal-backdrop.show .modal-sheet{transform:translateY(0);}
  .modal-sheet h3{margin:0 0 14px; font-size:14px; letter-spacing:0.5px; color:var(--text-dim); font-weight:700;}
  .modal-row{
    display:flex; align-items:center; justify-content:space-between; padding:12px 0;
    border-bottom:1px solid var(--line); font-size:14px;
  }
  .modal-row button{
    background:var(--card); border:none; color:var(--accent); padding:7px 14px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .new-pl-input{display:flex; gap:8px; margin-top:14px;}
  .new-pl-input input{
    flex:1; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--text); font-size:14px; outline:none;
  }
  .new-pl-input button{
    background:var(--accent); color:#000; border:none; border-radius:8px; padding:0 16px;
    font-weight:700; cursor:pointer;
  }

  #import-progress{
    position:fixed; top: calc(70px + var(--safe-top)); left:18px; right:18px; z-index:60;
    background:var(--card); border-left:3px solid var(--accent); border-radius:8px; padding:10px 14px;
    font-size:12.5px; opacity:0; transform:translateY(-10px); transition: opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  #import-progress.show{opacity:1; transform:translateY(0);}

  #toast{
    position:fixed; left:50%; bottom: calc(150px + var(--safe-bottom)); z-index:80;
    background:var(--card); border:1px solid var(--line); color:var(--text); font-size:12.5px;
    padding:9px 16px; border-radius:20px; opacity:0; pointer-events:none;
    transform: translate(-50%,8px); transition: opacity .22s ease, transform .22s ease;
  }
  #toast.show{opacity:1; transform: translate(-50%,0);}

  .queue-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .queue-row .qnum{width:18px; font-size:11px; color:var(--text-dim); flex-shrink:0;}
  .queue-row .qmeta{flex:1; min-width:0;}
  .queue-row .qtitle{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .queue-row .qartist{font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .queue-row.now .qtitle{color:var(--accent);}
  .queue-row button{background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; flex-shrink:0;}

  #file-input{display:none;}

  @keyframes pulse{ 0%{transform:scale(1);} 35%{transform:scale(1.3);} 100%{transform:scale(1);} }
  .pulse{animation: pulse .35s var(--ease);}

  @keyframes spinSlow{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .spin-slow{animation: spinSlow 18s linear infinite;}
</style>
</head>
<body>
<div id="app">

  <main id="main">

    <section class="view active" id="view-home">
      <h1 class="greet" id="greet-text">Good evening</h1>
      <div class="quickgrid" id="home-quick"></div>
      <div id="home-recent-section" style="display:none;">
        <div class="section-title">Recently added</div>
        <div class="hscroll" id="home-recent"></div>
      </div>
      <div id="home-pl-section" style="display:none;">
        <div class="section-title">Your playlists</div>
        <div class="hscroll" id="home-playlists"></div>
      </div>
      <div id="home-empty"></div>
    </section>

    <section class="view" id="view-search">
      <div id="search-results"></div>
    </section>

    <section class="view" id="view-library">
      <div class="lib-header"><h1>Your Library</h1></div>
      <div id="lib-pinned-wrap"></div>
      <div id="lib-pl-list"></div>
    </section>

    <section class="view" id="view-songlist">
      <button class="icon-btn tappable" id="songlist-back" style="background:none;border:none;color:var(--text);font-size:22px;margin-bottom:10px;">‹</button>
      <div class="lib-header"><h1 id="songlist-name" style="font-size:22px;">List</h1></div>
      <div id="songlist-rows"></div>
    </section>

  </main>

  <div id="search-wrap" style="display:none; position:fixed; top:0; left:0; right:0; z-index:55;">
    <input id="search" placeholder="Search your library…" autocomplete="off">
  </div>

  <div id="import-progress"></div>

  <button id="fab">＋</button>

  <div id="mini-bar">
    <div id="mini-progress"></div>
    <div id="mini-art"><i style="font-style:normal;">♪</i></div>
    <div id="mini-meta">
      <div id="mini-title">Nothing playing</div>
      <div id="mini-artist">—</div>
    </div>
    <button id="mini-playpause">▶</button>
    <button id="mini-next">⏭</button>
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="home"><span class="gi">⌂</span>Home</button>
    <button class="nav-btn" data-view="search"><span class="gi">⌕</span>Search</button>
    <button class="nav-btn" data-view="library"><span class="gi">≡</span>Your Library</button>
  </nav>
</div>

<div id="player-overlay">
  <div class="po-top">
    <button class="tappable" id="po-close" style="background:none;border:none;color:var(--text);font-size:22px;">⌄</button>
    <div class="lbl">Now Playing</div>
    <button class="tappable" id="po-queue" style="background:none;border:none;color:var(--text);font-size:18px;">☰</button>
  </div>
  <div class="po-stage">
    <div class="album-art" id="po-art">♪</div>
  </div>
  <div class="po-meta">
    <div>
      <div class="po-title" id="po-title">—</div>
      <div class="po-artist" id="po-artist">—</div>
    </div>
    <button class="heart-big tappable" id="po-heart">♡</button>
  </div>
  <div class="po-progress">
    <input type="range" id="seek" min="0" max="100" value="0">
    <div class="po-times"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
  </div>
  <div class="po-controls">
    <button class="toggle-btn" id="shuffle-btn">🔀</button>
    <button class="side-btn" id="prev-btn">⏮</button>
    <button class="play-btn" id="playpause-btn">▶</button>
    <button class="side-btn" id="next-btn">⏭</button>
    <button class="toggle-btn" id="repeat-btn">🔁</button>
  </div>
</div>

<div class="modal-backdrop" id="add-modal">
  <div class="modal-sheet">
    <h3>ADD TO PLAYLIST</h3>
    <div id="add-pl-rows"></div>
    <div class="new-pl-input">
      <input id="new-pl-name" placeholder="New playlist name">
      <button id="new-pl-create">Create</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="song-menu-modal">
  <div class="modal-sheet">
    <h3 id="song-menu-title">TRACK</h3>
    <div class="modal-row" id="sm-play"><span>▶ Play</span></div>
    <div class="modal-row" id="sm-playnext"><span>⏭ Play next</span></div>
    <div class="modal-row" id="sm-addqueue"><span>＋ Add to queue</span></div>
    <div class="modal-row" id="sm-add"><span>♬ Add to playlist</span></div>
    <div class="modal-row" id="sm-remove" style="display:none;"><span>− Remove from this playlist</span></div>
    <div class="modal-row" id="sm-delete"><span style="color:#ff6b6b;">🗑 Delete from library</span></div>
  </div>
</div>

<div class="modal-backdrop" id="queue-modal">
  <div class="modal-sheet">
    <h3>UP NEXT</h3>
    <div id="queue-rows"></div>
  </div>
</div>

<div id="toast"></div>

<input type="file" id="file-input" webkitdirectory directory multiple accept="audio/*">

<audio id="audio-el" preload="metadata"></audio>

<script>
(function(){
  "use strict";

  const DB_NAME = "EchoPlayerDB", DB_VER = 1;
  let db;
  function openDB(){
    return new Promise((resolve, reject)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = (e)=>{
        const d = e.target.result;
        if(!d.objectStoreNames.contains("songs")){
          const s = d.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
          s.createIndex("title","title");
        }
        if(!d.objectStoreNames.contains("playlists")){
          d.createObjectStore("playlists", {keyPath:"id", autoIncrement:true});
        }
      };
      req.onsuccess = ()=>{ db = req.result; resolve(db); };
      req.onerror = ()=> reject(req.error);
    });
  }
  function tx(store, mode){ return db.transaction(store, mode).objectStore(store); }
  function getAll(store){
    return new Promise((res,rej)=>{
      const r = tx(store,"readonly").getAll();
      r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
    });
  }
  function put(store, obj){
    return new Promise((res,rej)=>{
      const r = tx(store,"readwrite").put(obj);
      r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
    });
  }
  function del(store, id){
    return new Promise((res,rej)=>{
      const r = tx(store,"readwrite").delete(id);
      r.onsuccess=()=>res(); r.onerror=()=>rej(r.error);
    });
  }

  function fmtTime(s){

  }
  function parseFilename(name){
    let n = name.replace(/\.[^/.]+$/, "");
    const parts = n.split(" - ");
    if(parts.length >= 2) return { artist: parts[0].trim(), title: parts.slice(1).join(" - ").trim() };
    return { artist: "Unknown Artist", title: n.trim() };
  }
  function songById(id){ return songs.find(s=>s.id===id); }
  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function ensureLikedPlaylist(){
    if(likedPlaylist) return likedPlaylist;
    likedPlaylist = playlists.find(p=>p.special === "liked");
    return likedPlaylist;

  function isLiked(songId){
    const lp = ensureLikedPlaylist();

  async function toggleLike(songId){
    let lp = ensureLikedPlaylist();
    if(!lp){
      lp = { name: "Liked Songs", songIds: [], special: "liked" };
      const id = await put("playlists", lp);
      lp.id = id;
      playlists.push(lp);
      likedPlaylist = lp;

    if(lp.songIds.includes(songId)) lp.songIds = lp.songIds.filter(id=>id!==songId);

  function bindSongRows(container, arr){
    container.querySelectorAll(".song-row").forEach(row=>{
      let startX=0, startY=0, dx=0, dragging=false, decided=false, isHorizontal=false;
      const THRESHOLD = 70, MAX = 96;
      row.addEventListener("pointerdown",(e)=>{
        if(e.target.closest(".menu-btn") || e.target.closest(".heart-btn")) return;
        startX = e.clientX; startY = e.clientY; dx = 0; dragging = true; decided = false; isHorizontal = false;
        row.style.transition = "none";
      });
      row.addEventListener("pointermove",(e)=>{
        if(!dragging) return;
        const ddx = e.clientX - startX, ddy = e.clientY - startY;
        if(!decided){
          if(Math.abs(ddx) > 8 || Math.abs(ddy) > 8){
            decided = true; isHorizontal = Math.abs(ddx) > Math.abs(ddy);
            if(isHorizontal) row.setPointerCapture(e.pointerId);
          } else return;
        }
        if(!isHorizontal) return;
        dx = Math.max(0, Math.min(MAX, ddx));
        row.style.transform = `translateX(${dx}px)`;
      });
      const release = ()=>{
        if(!dragging) return;
        dragging = false;
        row.style.transition = "transform .18s var(--ease)";
        if(isHorizontal && dx >= THRESHOLD) addToQueueNext(Number(row.dataset.id));
        row.style.transform = "translateX(0)";
      };
      row.addEventListener("pointerup", release);
      row.addEventListener("pointercancel", release);
      row.addEventListener("click",(e)=>{
        if(e.target.closest(".menu-btn") || e.target.closest(".heart-btn")) return;
        if(decided && isHorizontal) return;
        const id = Number(row.dataset.id);
        const ids = arr.map(s=>s.id);
        playQueue(ids, ids.indexOf(id));
      });
    });
    container.querySelectorAll(".menu-btn").forEach(btn=>{
      btn.addEventListener("click",(e)=>{ e.stopPropagation(); openSongMenu(Number(btn.dataset.menu)); });
    });
    container.querySelectorAll(".heart-btn").forEach(btn=>{
      btn.addEventListener("click",(e)=>{
        e.stopPropagation();
        btn.classList.add("pulse");
        setTimeout(()=>btn.classList.remove("pulse"), 350);
        toggleLike(Number(btn.dataset.heart));
      });
    });
  }

  function addToQueueNext(songId){
    const s = songById(songId);
    if(!s) return;
    if(!queue.length || queueIndex < 0){ queue=[songId]; queueIndex=0; loadAndPlay(); showToast(`Playing now: ${s.title}`); return; }
    queue.splice(queueIndex + 1, 0, songId);
    showToast(`Up next: ${s.title}`);
    renderQueueModalIfOpen();
  }
  function addToQueueEnd(songId){
    const s = songById(songId);
    if(!s) return;
    if(!queue.length || queueIndex < 0){ queue=[songId]; queueIndex=0; loadAndPlay(); showToast(`Playing now: ${s.title}`); return; }

  function renderQueueModal(){

  // ---------- Playback ----------
  function playQueue(ids, startIndex){ queue = ids.slice(); queueIndex = startIndex; loadAndPlay(); }
  function loadAndPlay(){
    const id = queue[queueIndex];
    const s = songById(id);
    if(!s) return;
    if(currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
    currentObjectUrl = URL.createObjectURL(s.blob);
    audio.src = currentObjectUrl;
    audio.play().catch(()=>{});
    updateNowPlayingUI(s, true);
    renderAll();
  }
  function updateNowPlayingUI(s, playing){
    document.getElementById("mini-bar").classList.add("show");
    document.getElementById("mini-title").textContent = s.title;
    document.getElementById("mini-artist").textContent = s.artist;
    document.getElementById("po-title").textContent = s.title;
    document.getElementById("po-artist").textContent = s.artist;
    document.getElementById("po-art").classList.toggle("liked", isLiked(s.id));
    updateNowPlayingHeart();
    setPlayingIcon(playing);
  }
  function updateNowPlayingHeart(){
    const id = queue[queueIndex];
    if(id === undefined) return;
    const liked = isLiked(id);
    const h = document.getElementById("po-heart");
    h.textContent = liked ? "♥" : "♡";
    h.classList.toggle("liked", liked);
  }
  function setPlayingIcon(playing){
    document.getElementById("mini-playpause").textContent = playing ? "⏸" : "▶";
    document.getElementById("playpause-btn").textContent = playing ? "⏸" : "▶";
    document.getElementById("mini-art").classList.toggle("spin-slow", playing);
    document.getElementById("po-art").classList.toggle("spin-slow", false);
  }
  function togglePlayPause(){ if(audio.paused) audio.play().catch(()=>{}); else audio.pause(); }
  function playNext(manual){
    if(!queue.length) return;
    if(repeatMode === 2 && !manual){ audio.currentTime = 0; audio.play(); return; }
    if(shuffleOn){
      if(queue.length === 1) queueIndex = 0;
      else { let next; do { next = Math.floor(Math.random()*queue.length); } while(next === queueIndex); queueIndex = next; }
    } else {
      queueIndex++;
      if(queueIndex >= queue.length){
        if(repeatMode === 1) queueIndex = 0;
        else { queueIndex = queue.length - 1; setPlayingIcon(false); audio.pause(); return; }
      }
    }
    loadAndPlay();
  }
  function playPrev(){
    if(!queue.length) return;
    if(audio.currentTime > 3){ audio.currentTime = 0; return; }
    queueIndex = shuffleOn ? Math.floor(Math.random()*queue.length) : Math.max(0, queueIndex-1);
    loadAndPlay();
  }

  audio.addEventListener("play", ()=> setPlayingIcon(true));
  audio.addEventListener("pause", ()=> setPlayingIcon(false));
  audio.addEventListener("ended", ()=> playNext(false));
  audio.addEventListener("timeupdate", ()=>{
    if(!isFinite(audio.duration)) return;
    const pct = (audio.currentTime/audio.duration*100) || 0;
    document.getElementById("seek").value = pct;
    document.getElementById("mini-progress").style.width = pct + "%";
    document.getElementById("t-cur").textContent = fmtTime(audio.currentTime);
    document.getElementById("t-dur").textContent = fmtTime(audio.duration);
  });
  document.getElementById("seek").addEventListener("input", (e)=>{
    if(isFinite(audio.duration)) audio.currentTime = (e.target.value/100) * audio.duration;
  });

  document.getElementById("mini-playpause").addEventListener("click", togglePlayPause);
  document.getElementById("mini-next").addEventListener("click", ()=>playNext(true));
  document.getElementById("playpause-btn").addEventListener("click", togglePlayPause);
  document.getElementById("next-btn").addEventListener("click", ()=>playNext(true));
  document.getElementById("prev-btn").addEventListener("click", playPrev);
  document.getElementById("shuffle-btn").addEventListener("click", (e)=>{ shuffleOn = !shuffleOn; e.currentTarget.classList.toggle("on", shuffleOn); });
  document.getElementById("repeat-btn").addEventListener("click", (e)=>{
    repeatMode = (repeatMode + 1) % 3;
    e.currentTarget.classList.toggle("on", repeatMode > 0);
    e.currentTarget.textContent = repeatMode === 2 ? "🔂" : "🔁";
  });
  document.getElementById("po-heart").addEventListener("click", (e)=>{
    e.currentTarget.classList.add("pulse");
    setTimeout(()=>e.currentTarget.classList.remove("pulse"), 350);
    const id = queue[queueIndex];
    if(id !== undefined) toggleLike(id);
  });

  document.getElementById("mini-bar").addEventListener("click",(e)=>{
    if(e.target.closest("button")) return;
    document.getElementById("player-overlay").classList.add("show");
  });
  document.getElementById("po-close").addEventListener("click", ()=> document.getElementById("player-overlay").classList.remove("show"));

  async function init(){
    await openDB();
    songs = await getAll("songs");
    playlists = await getAll("playlists");
    ensureLikedPlaylist();
    renderHomeView();
    if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
  }
  init();

})();
</script>
</body>
</html>
